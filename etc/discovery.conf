# NTS Remote Discovery Configuration

# Discovery method:
#   auto        - try nmap, neighbors, and known-hosts
#   nmap        - network scan using nmap -sn
#   neighbors   - use local ARP/neighbor table
#   known-hosts - read ~/.ssh/known_hosts
method=auto

# Optional CIDR for nmap discovery (blank = auto-detect when possible)
network=

# Timeout in seconds for TCP port probes
timeout=1

# Probe and allow Telnet targets (yes/no)
enable-telnet=yes

# Maximum reachable hosts shown in the menu
max-hosts=100

# Maximum discovered hosts to probe per scan cycle
max-probe-hosts=24
